<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ტურისტული სააგენტო</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="services-section">
    <h2 class="services-section__title">აღმოაჩინე სამყარო</h2> 
    <h2 class="services-section__subtitle">
        ტურისტული სააგენტო</h2>
    <div class="container">
        <article class="tour-card">
            <img src="https://www.chooseparisregion.org/sites/default/files/news/6---Tour-Eiffel_AdobeStock_644956457_1920_72dpi.jpg" alt="Tour-card-image">
            <div class="tour-card-content">
                <h3 class="tour-card-content__title">PARIS</h3>
                <span class="tour-card-content__price">₾2500</span>
                <button class="tour-card-content__button">დაჯავშნე</button>
                
            </div>
        </article>
        <article class="tour-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/67/London_Skyline_%28125508655%29.jpeg/1920px-London_Skyline_%28125508655%29.jpeg" alt="Tour-card-image">
            <div class="tour-card-content">
                <h3 class="tour-card-content__title">LONDON</h3>
                <span class="tour-card-content__price">₾3000</span>
                <button class="tour-card-content__button">დაჯავშნე</button>
                
            </div>
        </article>
        <article class="tour-card">
            <img src="https://idsb.tmgrup.com.tr/ly/uploads/images/2025/03/12/372657.jpg" alt="Tour-card-image">
            <div class="tour-card-content">
                <h3 class="tour-card-content__title">TOKYO</h3>
                <span class="tour-card-content__price">₾3500</span>
                <button class="tour-card-content__button">დაჯავშნე</button>
                
            </div>
        </article>
    </div>
    

            
    </div>
  </section>  
    
</body>
</html>
